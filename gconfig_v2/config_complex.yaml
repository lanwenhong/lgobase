app:
  name: "payment-api"
  enabled: yes
  version: 2.5
  launch_date: 2026-06-24
  empty_value: null
  tags: [core, payment, v2]
  thresholds:
    qps: 1200
    ratio: 0.75
    timeout: 2026-06-24T08:30:00Z

database:
  primary:
    host: db.local
    port: 3306
    flags: {ssl: true, pool: 20, mode: "rw"}
  replicas:
    - name: r1
      host: db-r1.local
      weight: 10
    - name: r2
      host: db-r2.local
      weight: 20

routes:
  - login:
    path: "/login"
    methods: [GET, POST]
    auth: true
  - health:
    path: "/health"
    methods: [GET]
    auth: false
